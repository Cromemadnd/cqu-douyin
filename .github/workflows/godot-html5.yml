name: Godot HTML5 CI/CD

on:
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

env:
  GODOT_VERSION: 4.6-stable
  GODOT_TEMPLATES_VERSION: 4.6.stable
  GODOT_EXECUTABLE: Godot_v4.6-stable_linux.x86_64

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y unzip

      - name: Install Godot
        run: |
          curl -L -o godot.zip "https://github.com/godotengine/godot-builds/releases/download/${GODOT_VERSION}/Godot_v4.6-stable_linux.x86_64.zip"
          unzip -q godot.zip
          chmod +x "${GODOT_EXECUTABLE}"
          sudo mv "${GODOT_EXECUTABLE}" /usr/local/bin/godot

      - name: Install export templates
        run: |
          curl -L -o export_templates.tpz "https://github.com/godotengine/godot-builds/releases/download/${GODOT_VERSION}/Godot_v4.6-stable_export_templates.tpz"
          mkdir -p "${HOME}/.local/share/godot/export_templates/${GODOT_TEMPLATES_VERSION}"
          unzip -q export_templates.tpz
          mv templates/* "${HOME}/.local/share/godot/export_templates/${GODOT_TEMPLATES_VERSION}/"

      - name: Import project
        run: godot --headless --import --quit

      - name: Export Web build
        run: |
          mkdir -p build/web
          godot --headless --verbose --export-release "Web" build/web/index.html
          find build/web -maxdepth 2 -type f -print
          test -s build/web/index.html

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
